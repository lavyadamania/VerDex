<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#0f172a"/>
  
  <!-- Scale Icon -->
  <g stroke="#facc15" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    
    <!-- Top beam -->
    <line x1="16" y1="20" x2="48" y2="20"/>
    
    <!-- Center pole -->
    <line x1="32" y1="20" x2="32" y2="44"/>
    
    <!-- Left chain -->
    <line x1="20" y1="20" x2="16" y2="30"/>
    <!-- Right chain -->
    <line x1="44" y1="20" x2="48" y2="30"/>
    
    <!-- Left scale -->
    <path d="M12 30 L20 30 L16 36 Z" fill="#facc15"/>
    
    <!-- Right scale -->
    <path d="M44 30 L52 30 L48 36 Z" fill="#facc15"/>
    
    <!-- Base -->
    <rect x="26" y="44" width="12" height="4" rx="2" fill="#facc15"/>
    
  </g>
</svg>